name: Build APK (main) on v* tag

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > keystore.jks

      - name: Build Release APK and AAB
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/keystore.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew :wear:assembleRelease :wear:bundleRelease :app:assembleRelease :app:bundleRelease

      - name: Rename artifacts to include tag
        run: |
          APK="$(ls wear/build/outputs/apk/release/*.apk | head -n 1)"
          mv "$APK" "Phreemote-wear-${{ github.ref_name }}.apk"
          AAB="$(ls wear/build/outputs/bundle/release/*.aab | head -n 1)"
          mv "$AAB" "Phreemote-wear-${{ github.ref_name }}.aab"
          MOBILE_APK="$(ls app/build/outputs/apk/release/*.apk | head -n 1)"
          mv "$MOBILE_APK" "Phreemote-phone-${{ github.ref_name }}.apk"
          MOBILE_AAB="$(ls app/build/outputs/bundle/release/*.aab | head -n 1)"
          mv "$MOBILE_AAB" "Phreemote-phone-${{ github.ref_name }}.aab"

      - name: Upload Wear APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: wear-apk-${{ github.ref_name }}
          path: Phreemote-wear-${{ github.ref_name }}.apk
          if-no-files-found: error

      - name: Upload Wear AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: wear-aab-${{ github.ref_name }}
          path: Phreemote-wear-${{ github.ref_name }}.aab
          if-no-files-found: error

      - name: Upload Phone APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: phone-apk-${{ github.ref_name }}
          path: Phreemote-phone-${{ github.ref_name }}.apk
          if-no-files-found: error

      - name: Upload Phone AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: phone-aab-${{ github.ref_name }}
          path: Phreemote-phone-${{ github.ref_name }}.aab
          if-no-files-found: error

      - name: Publish all artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            Phreemote-wear-${{ github.ref_name }}.apk
            Phreemote-wear-${{ github.ref_name }}.aab
            Phreemote-phone-${{ github.ref_name }}.apk
            Phreemote-phone-${{ github.ref_name }}.aab
