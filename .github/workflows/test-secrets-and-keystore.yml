name: Test Secrets and Keystore

on:
  workflow_dispatch: # Erlaubt den manuellen Start zum Testen

jobs:
  check-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify Secret Presence
        run: |
          echo "Prüfe, ob Secrets gesetzt sind..."
          if [ -z "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then echo "❌ BASE64 fehlt"; exit 1; else echo "✅ BASE64 ist da"; fi
          if [ -z "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" ]; then echo "❌ PASSWORD fehlt"; exit 1; else echo "✅ PASSWORD ist da"; fi
          if [ -z "${{ secrets.ANDROID_KEY_ALIAS }}" ]; then echo "❌ ALIAS fehlt"; exit 1; else echo "✅ ALIAS ist da"; fi
          if [ -z "${{ secrets.ANDROID_KEY_PASSWORD }}" ]; then echo "❌ KEY_PASSWORD fehlt"; exit 1; else echo "✅ KEY_PASSWORD ist da"; fi

      - name: Try Decode Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > test_keystore.jks
          if [ -s test_keystore.jks ]; then
            echo "✅ Keystore erfolgreich dekodiert (Datei ist nicht leer)"
            # Zeigt Infos über den Keystore an (OHNE Passwörter zu verraten)
            keytool -list -keystore test_keystore.jks -storepass "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}"
            echo "✅ Keytool konnte auf den Keystore zugreifen"
          else
            echo "❌ Dekodierung fehlgeschlagen oder Datei leer"
            exit 1
          fi